version: '3.7'
services:
  app_proxy:
    environment:
      APP_HOST: jellyfin_server_1
      APP_PORT: 8096
      PROXY_AUTH_ADD: 'false'
    container_name: jellyfin_app_proxy_1
  server:
    image: >-
      linuxserver/jellyfin:10.10.0
    restart: on-failure
    hostname: ${DEVICE_HOSTNAME}
    environment:
      - PUID=1000
      - PGID=1000
    volumes:
      - ${APP_DATA_DIR}/data/config:/config
      - ${UMBREL_ROOT}/home/Downloads:/downloads
    ports:
      - 7359:7359/udp
    container_name: jellyfin_server_1
